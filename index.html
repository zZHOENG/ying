<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>中国大学地图 · 高校分布</title>
    <!-- 使用 ECharts 5 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局重置 & CSS变量 ===== */
        :root {
            --primary: #2b7bb6;
            --primary-light: #e6f0fa;
            --primary-dark: #1a5a8a;
            --bg: #f5f9fe;
            --card-bg: #ffffff;
            --shadow: 0 8px 30px rgba(43, 123, 182, 0.15);
            --radius: 16px;
            --transition: 0.25s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --red-marker: #e74c3c;
            --red-hover: #c0392b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: #1e2a3a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部工具栏 ===== */
        .toolbar {
            background: var(--card-bg);
            padding: 14px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(43, 123, 182, 0.10);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.3px;
            user-select: none;
        }
        .logo-icon {
            font-size: 26px;
        }
        .logo span {
            font-weight: 400;
            color: #5a7a9a;
            font-size: 14px;
            margin-left: 2px;
        }

        .toolbar-center {
            flex: 1 1 280px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }

        .search-box {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box input {
            width: 100%;
            padding: 8px 16px 8px 38px;
            border: 2px solid #dce7f3;
            border-radius: 30px;
            font-size: 14px;
            background: var(--bg);
            transition: var(--transition);
            outline: none;
            color: #1e2a3a;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(43, 123, 182, 0.12);
            background: #fff;
        }
        .search-box input::placeholder {
            color: #9ab0c9;
        }
        .search-box .search-icon {
            position: absolute;
            left: 12px;
            font-size: 18px;
            color: #8aa6c4;
            pointer-events: none;
        }
        .search-box .clear-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            font-size: 16px;
            color: #b0c8dd;
            cursor: pointer;
            display: none;
            padding: 2px 4px;
        }
        .search-box .clear-btn.visible {
            display: block;
        }
        .search-box .clear-btn:hover {
            color: var(--primary);
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-add:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(43, 123, 182, 0.30);
        }
        .btn-add:active {
            transform: scale(0.96);
        }

        .stats-badge {
            font-size: 13px;
            color: #5a7a9a;
            background: var(--bg);
            padding: 4px 14px;
            border-radius: 20px;
            white-space: nowrap;
            border: 1px solid #dce7f3;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            background: var(--card-bg);
            padding: 8px 24px 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(43, 123, 182, 0.06);
        }
        .filter-bar .filter-label {
            font-size: 13px;
            font-weight: 600;
            color: #5a7a9a;
            margin-right: 4px;
        }
        .filter-btn {
            padding: 4px 16px;
            border-radius: 30px;
            border: 1.5px solid #dce7f3;
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            color: #3a5a7a;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(43, 123, 182, 0.25);
        }
        .filter-btn.active:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        /* ===== 地图容器 ===== */
        #map-container {
            flex: 1;
            position: relative;
            min-height: 0;
            background: #eaf1fa;
        }
        #map-chart {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        /* ===== 加载状态 ===== */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(234, 241, 250, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(43, 123, 182, 0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .loading-text {
            margin-top: 16px;
            color: var(--primary);
            font-weight: 500;
            font-size: 15px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 自定义信息弹窗 ===== */
        .info-popup {
            position: absolute;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 22px 26px 20px 26px;
            max-width: 380px;
            width: max-content;
            min-width: 220px;
            z-index: 20;
            display: none;
            pointer-events: auto;
            border: 1px solid rgba(43, 123, 182, 0.08);
            animation: popFade 0.2s ease;
        }
        .info-popup.visible {
            display: block;
        }
        @keyframes popFade {
            0% {
                opacity: 0;
                transform: translateY(6px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .info-popup .popup-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 20px;
            color: #aabccf;
            cursor: pointer;
            transition: var(--transition);
            line-height: 1;
            padding: 2px 4px;
        }
        .info-popup .popup-close:hover {
            color: var(--primary);
            transform: rotate(90deg);
        }

        .info-popup .uni-name {
            font-size: 20px;
            font-weight: 700;
            color: #0a1a2a;
            margin-right: 28px;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .info-popup .uni-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .info-popup .uni-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid rgba(43, 123, 182, 0.15);
        }
        .info-popup .uni-tag.dual {
            background: #fef3c7;
            color: #b7791f;
            border-color: #f6d89c;
        }
        .info-popup .uni-tag.nine {
            background: #dbeafe;
            color: #1e4a7a;
            border-color: #b6d4f0;
        }
        .info-popup .uni-tag.two {
            background: #e0e7ff;
            color: #3730a3;
            border-color: #c7d2fe;
        }
        .info-popup .uni-tag.undergrad {
            background: #d1fae5;
            color: #065f46;
            border-color: #a7f3d0;
        }
        .info-popup .uni-tag.vocational {
            background: #fce4ec;
            color: #9a3b4a;
            border-color: #f8bbd0;
        }

        .info-popup .uni-website {
            margin: 8px 0 10px 0;
        }
        .info-popup .uni-website a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 1.5px solid transparent;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .info-popup .uni-website a:hover {
            border-bottom-color: var(--primary);
            color: var(--primary-dark);
        }
        .info-popup .uni-website a::after {
            content: '↗';
            font-size: 14px;
        }

        .info-popup .uni-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #2a3a4e;
            max-height: 100px;
            overflow-y: auto;
            padding-right: 4px;
            margin-top: 2px;
            border-top: 1px solid #eef4f9;
            padding-top: 10px;
        }
        .info-popup .uni-desc::-webkit-scrollbar {
            width: 4px;
        }
        .info-popup .uni-desc::-webkit-scrollbar-thumb {
            background: #cbdae8;
            border-radius: 4px;
        }

        /* 弹窗定位小三角 */
        .info-popup::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid var(--card-bg);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.04));
        }
        .info-popup.popup-top::before {
            bottom: auto;
            top: -10px;
            border-top: none;
            border-bottom: 10px solid var(--card-bg);
        }

        /* ===== 添加大学模态框 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.visible {
            display: flex;
        }
        .modal-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            padding: 32px 36px 28px 36px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.20);
            animation: modalIn 0.25s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes modalIn {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-box h2 {
            font-size: 22px;
            color: #0a1a2a;
            margin-bottom: 6px;
        }
        .modal-box .sub {
            color: #6a8aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box label {
            font-weight: 600;
            font-size: 14px;
            color: #1e2a3a;
            display: block;
            margin-top: 14px;
            margin-bottom: 4px;
        }
        .modal-box label .required {
            color: #e74c3c;
            margin-left: 2px;
        }
        .modal-box input,
        .modal-box select,
        .modal-box textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #dce7f3;
            border-radius: 10px;
            font-size: 14px;
            transition: var(--transition);
            background: var(--bg);
            font-family: var(--font);
            color: #1e2a3a;
        }
        .modal-box input:focus,
        .modal-box select:focus,
        .modal-box textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(43, 123, 182, 0.10);
            background: #fff;
        }
        .modal-box textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-box .form-row {
            display: flex;
            gap: 16px;
        }
        .modal-box .form-row>div {
            flex: 1;
        }
        .modal-box .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal-box .form-actions button {
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .modal-box .btn-cancel {
            background: #eef4f9;
            color: #3a5a7a;
        }
        .modal-box .btn-cancel:hover {
            background: #dce7f3;
        }
        .modal-box .btn-submit {
            background: var(--primary);
            color: #fff;
        }
        .modal-box .btn-submit:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 14px rgba(43, 123, 182, 0.30);
        }
        .modal-box .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .toolbar {
                padding: 10px 16px;
                gap: 8px 12px;
            }
            .toolbar-left .logo {
                font-size: 17px;
            }
            .logo span {
                font-size: 12px;
            }
            .toolbar-center {
                flex: 1 1 100%;
                order: 3;
                min-width: 0;
            }
            .toolbar-right {
                margin-left: auto;
            }
            .btn-add {
                padding: 6px 14px;
                font-size: 13px;
            }
            .stats-badge {
                font-size: 11px;
                padding: 2px 10px;
            }
            .filter-bar {
                padding: 6px 16px 10px 16px;
                gap: 6px 10px;
            }
            .filter-btn {
                padding: 3px 12px;
                font-size: 12px;
            }
            .info-popup {
                max-width: 300px;
                padding: 18px 20px 16px 20px;
                font-size: 14px;
            }
            .info-popup .uni-name {
                font-size: 17px;
            }
            .modal-box {
                padding: 24px 20px 20px 20px;
            }
            .modal-box .form-row {
                flex-direction: column;
                gap: 0;
            }
        }

        @media (max-width: 420px) {
            .toolbar {
                padding: 8px 12px;
            }
            .logo {
                font-size: 15px;
            }
            .filter-bar .filter-label {
                font-size: 12px;
            }
            .filter-btn {
                font-size: 11px;
                padding: 2px 10px;
            }
            .info-popup {
                max-width: 260px;
                padding: 14px 16px 14px 16px;
            }
            .info-popup .uni-name {
                font-size: 16px;
            }
        }

        /* ===== 滚动条美化 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbdae8;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #aabccf;
        }

        /* ===== 搜索提示 ===== */
        .search-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.70);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            z-index: 15;
            pointer-events: none;
            backdrop-filter: blur(4px);
            animation: popFade 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- ===== 顶部工具栏 ===== -->
    <header class="toolbar">
        <div class="toolbar-left">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                大学地图
                <span>· 中国高校分布</span>
            </div>
        </div>

        <div class="toolbar-center">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索大学名称…" autocomplete="off" />
                <button class="clear-btn" id="clearSearchBtn" aria-label="清空搜索">✕</button>
            </div>
        </div>

        <div class="toolbar-right">
            <span class="stats-badge" id="statsBadge">共 <strong>0</strong> 所</span>
            <button class="btn-add" id="addUniBtn">➕ 添加大学</button>
        </div>
    </header>

    <!-- ===== 筛选栏 ===== -->
    <nav class="filter-bar" id="filterBar">
        <span class="filter-label">🏷️ 筛选：</span>
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="双一流">🌟 双一流</button>
        <button class="filter-btn" data-filter="985工程">🏛️ 985工程</button>
        <button class="filter-btn" data-filter="211工程">📚 211工程</button>
        <button class="filter-btn" data-filter="普通本科">🎯 普通本科</button>
        <button class="filter-btn" data-filter="专科">🔧 专科</button>
    </nav>

    <!-- ===== 地图容器 ===== -->
    <div id="map-container">
        <div id="map-chart"></div>
        <!-- 加载状态 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">加载地图数据…</div>
        </div>
        <!-- 自定义弹窗 -->
        <div class="info-popup" id="infoPopup">
            <button class="popup-close" id="popupClose">✕</button>
            <div class="uni-name" id="popupName">北京大学</div>
            <div class="uni-tags" id="popupTags"></div>
            <div class="uni-website" id="popupWebsite">
                <a href="#" target="_blank" rel="noopener">访问官网</a>
            </div>
            <div class="uni-desc" id="popupDesc">简介信息</div>
        </div>
    </div>

    <!-- ===== 添加大学模态框 ===== -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <h2>📌 添加大学</h2>
            <div class="sub">填写信息后，大学将出现在地图上（保存在本地浏览器中）</div>

            <label>大学名称 <span class="required">*</span></label>
            <input type="text" id="formName" placeholder="例如：西湖大学" />

            <div class="form-row">
                <div>
                    <label>经度 <span class="required">*</span></label>
                    <input type="number" id="formLng" placeholder="例如：120.1551" step="any" />
                </div>
                <div>
                    <label>纬度 <span class="required">*</span></label>
                    <input type="number" id="formLat" placeholder="例如：30.2741" step="any" />
                </div>
            </div>

            <label>办学层次 <span class="required">*</span></label>
            <select id="formLevel">
                <option value="双一流">🌟 双一流</option>
                <option value="985工程">🏛️ 985工程</option>
                <option value="211工程">📚 211工程</option>
                <option value="普通本科">🎯 普通本科</option>
                <option value="专科">🔧 专科</option>
            </select>

            <label>官方链接</label>
            <input type="url" id="formWebsite" placeholder="https://example.edu.cn" />

            <label>简介</label>
            <textarea id="formDesc" placeholder="请输入大学简介…" rows="2"></textarea>

            <div class="form-actions">
                <button class="btn-cancel" id="modalCancel">取消</button>
                <button class="btn-submit" id="modalSubmit">确认添加</button>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  1. 数据
        // ================================================================

        // 预置大学数据（约45所，覆盖全国主要城市 & 各层次）
        const DEFAULT_UNIVERSITIES = [{
            id: 1,
            name: '北京大学',
            lng: 116.4074,
            lat: 39.9042,
            level: '双一流',
            website: 'https://www.pku.edu.cn',
            desc: '北京大学创立于1898年，是中国近代第一所国立大学，以文理医工见长，综合实力位居全国前列。'
        }, {
            id: 2,
            name: '清华大学',
            lng: 116.3267,
            lat: 40.0031,
            level: '双一流',
            website: 'https://www.tsinghua.edu.cn',
            desc: '清华大学始建于1911年，中国顶尖工科大学，被誉为“红色工程师的摇篮”，综合实力享誉全球。'
        }, {
            id: 3,
            name: '中国人民大学',
            lng: 116.3195,
            lat: 39.9672,
            level: '985工程',
            website: 'https://www.ruc.edu.cn',
            desc: '中国人民大学成立于1937年，以人文社会科学见长，是中国哲学社会科学研究的重要基地。'
        }, {
            id: 4,
            name: '北京师范大学',

        /** 从 localStorage 加载数据，若没有则使用默认数据 */
        function loadData() {
            const stored = localStorage.getItem('uniMap_data');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        allUniversities = parsed;
                        return;
                    }
                } catch (_) { /* ignore */ }
            }
            // 首次使用，写入默认数据
            allUniversities = JSON.parse(JSON.stringify(DEFAULT_UNIVERSITIES));
            saveData();
        }

        function saveData() {
            localStorage.setItem('uniMap_data', JSON.stringify(allUniversities));
        }

        /** 获取当前筛选 + 搜索后的数据 */
        function getFilteredData() {
            let result = allUniversities;

            // 筛选
            if (currentFilter !== 'all') {
                result = result.filter(u => u.level === currentFilter);
            }

            // 搜索
            if (searchQuery.trim()) {
                const q = searchQuery.trim().toLowerCase();
                result = result.filter(u => u.name.toLowerCase().includes(q));
            }

            return result;
        }

        /** 根据ID查找大学 */
        function findUniversity(id) {
            return allUniversities.find(u => u.id === id);
        }

        /** 生成新ID */
        function genId() {
            const maxId = allUniversities.reduce((max, u) => Math.max(max, u.id), 0);
            return maxId + 1;
        }

        /** 添加新大学 */
        function addUniversity(data) {
            const newUni = {
                id: genId(),
                name: data.name.trim(),
                lng: parseFloat(data.lng),
                lat: parseFloat(data.lat),
                level: data.level,
                website: data.website ? data.website.trim() : '',
                desc: data.desc ? data.desc.trim() : '',
            };
            allUniversities.push(newUni);
            saveData();
            return newUni;
        }

        // ================================================================

        function initChart() {
            chartInstance = echarts.init(chartDom, null, { renderer: 'canvas' });
            window.addEventListener('resize', () => chartInstance && chartInstance.resize());
        }

        /** 加载 GeoJSON 并渲染地图 */
        async function loadGeoAndRender() {
            try {
                loadingOverlay.classList.remove('hidden');
                // 使用更稳定的 ECharts 官方示例数据源
                const resp = await fetch(
                    'https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/json/china.json'
                );
                if (!resp.ok) throw new Error('网络请求失败 (HTTP ' + resp.status + ')');
                geoData = await resp.json();
                echarts.registerMap('china', geoData);
                isMapLoaded = true;
                renderMap();
                loadingOverlay.classList.add('hidden');
            } catch (err) {
                console.error('地图数据加载失败:', err);
                loadingOverlay.classList.add('hidden');
                // 显示错误信息并提供一个重试按钮（简单提示）
                chartInstance.setOption({
                    title: {
                        text: '⚠️ 地图加载失败\n' + err.message + '\n请刷新页面重试',
                        left: 'center',
                        top: 'center',
                        textStyle: { fontSize: 16, color: '#5a7a9a', lineHeight: 30 }
                    }
                });
                // 显示可点击重试的提示（通过覆盖层）
                showRetryMessage();
            }
        }

        function showRetryMessage() {
            const container = document.getElementById('map-container');
            const old = container.querySelector('.retry-overlay');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'retry-overlay';
            div.style.cssText = `
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: rgba(234, 241, 250, 0.80);
                z-index: 6;
                pointer-events: auto;
                cursor: pointer;
                font-family: var(--font);
            `;
            div.innerHTML = `
                <div style="background: white; padding: 24px 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.10); text-align: center;">
                    <div style="font-size: 40px; margin-bottom: 10px;">🔄</div>
                    <div style="font-size: 18px; font-weight: 600; color: #1e2a3a;">地图加载失败</div>
                    <div style="font-size: 14px; color: #5a7a9a; margin: 8px 0 16px;">请检查网络后点击重试</div>
                    <button id="retryBtn" style="background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;">重试加载</button>
                </div>
            `;
            container.appendChild(div);
            document.getElementById('retryBtn').addEventListener('click', () => {
                div.remove();
                loadGeoAndRender();
            });
        }

        /** 渲染地图（根据当前筛选/搜索状态） */

            if (!chartInstance || !isMapLoaded || !geoData) return;

            const filtered = getFilteredData();
            const total = allUniversities.length;
            const shown = filtered.length;

            // 更新统计
            statsBadge.innerHTML = `共 <strong>${total}</strong> 所${shown !== total ? ` · 显示 ${shown}` : ''}`;

            // 构建散点数据
            const scatterData = filtered.map(u => ({
                value: [u.lng, u.lat],
                id: u.id,
                name: u.name,
                level: u.level,
                website: u.website,
                desc: u.desc,
            }));

            // 高亮选中的点
            const highlightId = selectedId;
            const option = {
                backgroundColor: 'transparent',
                tooltip: { show: false },
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    center: [104, 35],
                    itemStyle: {
                        areaColor: '#e8f0fa',
                        borderColor: '#b8cfe0',
                        borderWidth: 1.2,
                        shadowBlur: 6,
                        shadowColor: 'rgba(43,123,182,0.06)',
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#d4e4f5',
                        },
                        label: { show: false }
                    },
                    label: {
                        show: true,
                        color: '#5a7a9a',
                        fontSize: 10,
                        fontFamily: 'system-ui',
                    },
                },
                series: [{
                    name: '大学',
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: scatterData,
                    symbolSize: (val, params) => {
                        const isHighlight = params.data.id === highlightId;
                        return isHighlight ? 22 : 14;
                    },
                    itemStyle: {
                        color: (params) => {
                            const isHighlight = params.data.id === highlightId;
                            return isHighlight ? '#c0392b' : '#e74c3c';
                        },
                        shadowBlur: 6,
                        shadowColor: 'rgba(231, 76, 60, 0.25)',
                        borderColor: '#fff',
                        borderWidth: 2,
                    },
                    emphasis: {
                        scale: 1.6,
                        itemStyle: {
                            color: '#c0392b',
                            shadowBlur: 12,
                            shadowColor: 'rgba(231, 76, 60, 0.40)',
                            borderWidth: 2.5,
                        },
                        label: {
                            show: true,
                            formatter: '{b}',
                            position: 'top',
                            color: '#0a1a2a',
                            fontSize: 12,
                            fontWeight: 600,
                            backgroundColor: 'rgba(255,255,255,0.85)',
                            padding: [3, 10],
                            borderRadius: 6,
                            borderColor: 'rgba(43,123,182,0.15)',
                            borderWidth: 1,
                            shadowBlur: 4,
                            shadowColor: 'rgba(0,0,0,0.06)',
                        }
                    },
                    label: {
                        show: true,
                        formatter: (params) => {
                            if (params.data.id === highlightId) return params.data.name;
                            return '';
                        },
                        position: 'top',
                        color: '#0a1a2a',
                        fontSize: 12,
                        fontWeight: 600,
                        backgroundColor: 'rgba(255,255,255,0.80)',
                        padding: [2, 8],
                        borderRadius: 4,
                    },
                    animationDelay: (idx) => idx * 30,
                }]
            };

            chartInstance.setOption(option, true);

            // 如果有点被高亮，但不在当前数据中，清除高亮
            if (highlightId && !filtered.some(u => u.id === highlightId)) {
                selectedId = null;
                hidePopup();
            }

            // 移除旧的事件监听，避免重复绑定
            chartInstance.off('click');
            chartInstance.on('click', (params) => {
                // 确保 params 和 params.data 存在
                if (params && params.componentType === 'series' && params.data && params.data.id) {
                    const id = params.data.id;
                    const uni = findUniversity(id);
                    if (uni) {
                        // 传递事件对象，但注意可能为 null
                        showPopup(uni, params.event || null);
                        selectedId = id;
                        renderMap(); // 重新渲染以高亮
                    }
                }
            });

            chartInstance.off('mouseover');
            chartInstance.on('mouseover', (params) => {
                if (params && params.componentType === 'series') {
                    chartDom.style.cursor = 'pointer';
                }
            });
            chartInstance.off('mouseout');
            chartInstance.on('mouseout', () => {
                chartDom.style.cursor = 'default';
            });
        }

        // ================================================================
        //  5. 弹窗控制
        // ================================================================

        function showPopup(uni, event) {
            const { name, level, website, desc } = uni;

            popupName.textContent = name;

            // 标签
            popupTags.innerHTML = '';
            const levels = level.split(',').map(l => l.trim());
            levels.forEach(lv => {
                const info = LEVEL_MAP[lv];
                if (info) {
                    const tag = document.createElement('span');
                    tag.className = `uni-tag ${info.cls}`;
                    tag.textContent = info.label;
                    popupTags.appendChild(tag);
                } else {
                    const tag = document.createElement('span');
                    tag.className = 'uni-tag';
                    tag.textContent = lv;
                    popupTags.appendChild(tag);
                }
            });

            // 官网
            const linkEl = popupWebsite.querySelector('a');
            if (website && website.startsWith('http')) {
                linkEl.href = website;
                linkEl.textContent = '访问官网';
                linkEl.style.display = 'inline-flex';
            } else {
                linkEl.style.display = 'none';
            }

            // 简介
            popupDesc.textContent = desc || '暂无简介信息';

            // 定位弹窗
            const container = document.getElementById('map-container');
            const containerRect = container.getBoundingClientRect();

            let x, y;
            // 如果有事件对象，使用事件坐标
            if (event && typeof event.clientX === 'number' && typeof event.clientY === 'number') {
                x = event.clientX - containerRect.left;
                y = event.clientY - containerRect.top - 20;
            } else if (chartInstance) {
                // 后备：从数据中获取坐标转像素
                const coord = chartInstance.convertToPixel('geo', [uni.lng, uni.lat]);
                if (coord && Array.isArray(coord) && coord.length === 2) {
                    x = coord[0];
                    y = coord[1] - 30;
                } else {
                    // 默认居中
                    x = containerRect.width / 2;
                    y = containerRect.height / 2 - 40;
                }
            } else {
                x = containerRect.width / 2;
                y = containerRect.height / 2 - 40;
            }

            // 确保弹窗不超出边界
            const popupWidth = Math.min(380, containerRect.width - 40);
            const popupHeight = 280;

            let left = Math.max(12, Math.min(x - popupWidth / 2, containerRect.width - popupWidth - 12));
            let top = Math.max(12, Math.min(y, containerRect.height - popupHeight - 12));

            // 如果太靠下，调整到上方
            if (y > containerRect.height - popupHeight - 30) {
                top = Math.max(12, y - popupHeight - 20);
                popup.classList.add('popup-top');
            } else {
                popup.classList.remove('popup-top');
            }

            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.style.maxWidth = Math.min(380, containerRect.width - 40) + 'px';
            popup.classList.add('visible');
        }

        function hidePopup() {
            popup.classList.remove('visible');
        }

        // ================================================================
        //  6. 搜索逻辑
        // ================================================================

        function performSearch() {
            const query = searchInput.value.trim();
            searchQuery = query;
            clearSearchBtn.classList.toggle('visible', query.length > 0);

            // 如果有搜索词，尝试定位到第一个匹配的大学
            const filtered = getFilteredData();
            if (query && filtered.length > 0) {
                // 找到第一个匹配的（按名称包含）
                const matched = filtered.find(u => u.name.toLowerCase().includes(query.toLowerCase()));
                if (matched) {
                    selectedId = matched.id;
                    // 定位地图到该点
                    if (chartInstance && isMapLoaded) {
                        chartInstance.setOption({
                            geo: {
                                center: [matched.lng, matched.lat],
                                zoom: 4.5,
                            }
                        });
                    }
                    showPopup(matched, null);
                    renderMap();
                    return;
                }
            }

            // 无匹配或清空搜索
            if (!query) {
                selectedId = null;
                hidePopup();
                // 恢复地图视野
                if (chartInstance && isMapLoaded) {
                    chartInstance.setOption({
                        geo: {
                            center: [104, 35],
                            zoom: 1.2,
                        }
                    });
                }
                renderMap();
            } else {
                // 有搜索但无匹配
                selectedId = null;
                hidePopup();
                renderMap();
                showSearchToast('未找到匹配的大学');
            }
        }

        let toastTimer = null;

        function showSearchToast(msg) {
            const container = document.getElementById('map-container');
            const old = container.querySelector('.search-toast');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'search-toast';
            div.textContent = msg;
            container.appendChild(div);
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => div.remove(), 1500);
        }

        // ================================================================
        //  7. 筛选逻辑
        // ================================================================

        function setFilter(filter) {
            currentFilter = filter;
            filterBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            // 清除选中的高亮
            selectedId = null;
            hidePopup();
            renderMap();
        }

        // ================================================================
        //  8. 添加大学逻辑
        // ================================================================

        function openAddModal() {
            addModal.classList.add('visible');
            formName.value = '';
            formLng.value = '';
            formLat.value = '';
            formLevel.value = '双一流';
            formWebsite.value = '';
            formDesc.value = '';
            formName.focus();
        }

        function closeAddModal() {
            addModal.classList.remove('visible');
        }

        function handleAddSubmit() {
            const name = formName.value.trim();
            const lng = parseFloat(formLng.value);
            const lat = parseFloat(formLat.value);
            const level = formLevel.value;
            const website = formWebsite.value.trim();
            const desc = formDesc.value.trim();

            // 验证
            if (!name) { alert('请输入大学名称'); return; }
            if (isNaN(lng) || lng < 73 || lng > 135) { alert('请输入有效的经度 (73~135)'); return; }
            if (isNaN(lat) || lat < 3 || lat > 54) { alert('请输入有效的纬度 (3~54)'); return; }

            // 检查重名
            if (allUniversities.some(u => u.name === name)) {
                alert('该大学已存在，请勿重复添加');
                return;
            }

            const newUni = addUniversity({ name, lng, lat, level, website, desc });
            closeAddModal();
            // 切换到全部筛选，并选中新添加的大学
            if (currentFilter !== 'all') setFilter('all');
            else renderMap();
            // 定位到新大学
            selectedId = newUni.id;
            if (chartInstance && isMapLoaded) {
                chartInstance.setOption({
                    geo: { center: [newUni.lng, newUni.lat], zoom: 4.5 }
                });
            }
            renderMap();
            showPopup(newUni, null);
            // 清空搜索
            searchInput.value = '';
            searchQuery = '';
            clearSearchBtn.classList.remove('visible');
        }

        // ================================================================
        //  9. 初始化 & 事件绑定
        // ================================================================

        function init() {
            // 加载数据
            loadData();

            // 初始化图表
            initChart();

            // 加载地图并渲染
            loadGeoAndRender();

            // ---- 搜索事件 ----
            searchInput.addEventListener('input', performSearch);
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });

            // ---- 筛选事件 ----
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    setFilter(btn.dataset.filter);
                });
            });

            // ---- 弹窗关闭 ----
            popupClose.addEventListener('click', () => {
                selectedId = null;
                hidePopup();
                renderMap();
            });

            // ---- 添加大学 ----
            addUniBtn.addEventListener('click', openAddModal);
            modalCancel.addEventListener('click', closeAddModal);
            modalSubmit.addEventListener('click', handleAddSubmit);
            addModal.addEventListener('click', (e) => {
                if (e.target === addModal) closeAddModal();
            });
            document.querySelectorAll('#addModal input, #addModal select, #addModal textarea').forEach(el => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleAddSubmit();
                });
            });

            // ---- 键盘快捷键: ESC 关闭弹窗 ----
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (addModal.classList.contains('visible')) closeAddModal();
                    else {
                        selectedId = null;
                        hidePopup();
                        renderMap();
                    }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
            });
        }

        // 页面加载完成后启动
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }
    </script>

</body>
