<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>中国大学地图 · 高校分布</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局样式（与之前相同，略作精简） ===== */
        :root {
            --primary: #2b7bb6;
            --primary-light: #e6f0fa;
            --primary-dark: #1a5a8a;
            --bg: #f5f9fe;
            --card-bg: #ffffff;
            --radius: 16px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: #1e2a3a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: var(--card-bg);
            padding: 14px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(43, 123, 182, 0.10);
        }
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            user-select: none;
        }
        .logo-icon {
            font-size: 26px;
        }
        .logo span {
            font-weight: 400;
            color: #5a7a9a;
            font-size: 14px;
            margin-left: 2px;
        }
        .toolbar-center {
            flex: 1 1 280px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 8px 16px 8px 38px;
            border: 2px solid #dce7f3;
            border-radius: 30px;
            font-size: 14px;
            background: var(--bg);
            outline: none;
            transition: 0.25s;
        }
        .search-box input:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .search-box .search-icon {
            position: absolute;
            left: 12px;
            font-size: 18px;
            color: #8aa6c4;
            pointer-events: none;
        }
        .search-box .clear-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            font-size: 16px;
            color: #b0c8dd;
            cursor: pointer;
            display: none;
        }
        .search-box .clear-btn.visible {
            display: block;
        }
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-add:hover {
            background: var(--primary-dark);
        }
        .stats-badge {
            font-size: 13px;
            color: #5a7a9a;
            background: var(--bg);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #dce7f3;
        }
        .filter-bar {
            background: var(--card-bg);
            padding: 8px 24px 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(43, 123, 182, 0.06);
        }
        .filter-bar .filter-label {
            font-size: 13px;
            font-weight: 600;
            color: #5a7a9a;
        }
        .filter-btn {
            padding: 4px 16px;
            border-radius: 30px;
            border: 1.5px solid #dce7f3;
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            color: #3a5a7a;
            cursor: pointer;
            transition: 0.25s;
            white-space: nowrap;
        }
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        #map-container {
            flex: 1;
            position: relative;
            min-height: 0;
            background: #eaf1fa;
        }
        #map-chart {
            width: 100%;
            height: 100%;
            background: transparent;
        }
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(234, 241, 250, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(43, 123, 182, 0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loading-text {
            margin-top: 16px;
            color: var(--primary);
            font-weight: 500;
        }
        .info-popup {
            position: absolute;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.18);
            padding: 22px 26px 20px 26px;
            max-width: 380px;
            min-width: 220px;
            z-index: 20;
            display: none;
            border: 1px solid rgba(43, 123, 182, 0.08);
            animation: popFade 0.2s ease;
        }
        .info-popup.visible {
            display: block;
        }
        @keyframes popFade {
            0% {
                opacity: 0;
                transform: translateY(6px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .info-popup .popup-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 20px;
            color: #aabccf;
            cursor: pointer;
            transition: 0.25s;
        }
        .info-popup .popup-close:hover {
            color: var(--primary);
        }
        .info-popup .uni-name {
            font-size: 20px;
            font-weight: 700;
            color: #0a1a2a;
            margin-right: 28px;
            margin-bottom: 6px;
        }
        .info-popup .uni-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .info-popup .uni-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid rgba(43, 123, 182, 0.15);
        }
        .info-popup .uni-tag.dual {
            background: #fef3c7;
            color: #b7791f;
            border-color: #f6d89c;
        }
        .info-popup .uni-tag.nine {
            background: #dbeafe;
            color: #1e4a7a;
            border-color: #b6d4f0;
        }
        .info-popup .uni-tag.two {
            background: #e0e7ff;
            color: #3730a3;
            border-color: #c7d2fe;
        }
        .info-popup .uni-tag.undergrad {
            background: #d1fae5;
            color: #065f46;
            border-color: #a7f3d0;
        }
        .info-popup .uni-tag.vocational {
            background: #fce4ec;
            color: #9a3b4a;
            border-color: #f8bbd0;
        }
        .info-popup .uni-website {
            margin: 8px 0 10px 0;
        }
        .info-popup .uni-website a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 1.5px solid transparent;
            transition: 0.25s;
        }
        .info-popup .uni-website a:hover {
            border-bottom-color: var(--primary);
        }
        .info-popup .uni-website a::after {
            content: '↗';
            font-size: 14px;
        }
        .info-popup .uni-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #2a3a4e;
            max-height: 100px;
            overflow-y: auto;
            border-top: 1px solid #eef4f9;
            padding-top: 10px;
        }
        .info-popup::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid var(--card-bg);
        }
        .info-popup.popup-top::before {
            bottom: auto;
            top: -10px;
            border-top: none;
            border-bottom: 10px solid var(--card-bg);
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.visible {
            display: flex;
        }
        .modal-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            padding: 32px 36px 28px 36px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-box h2 {
            font-size: 22px;
            color: #0a1a2a;
            margin-bottom: 6px;
        }
        .modal-box .sub {
            color: #6a8aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box label {
            font-weight: 600;
            font-size: 14px;
            color: #1e2a3a;
            display: block;
            margin-top: 14px;
            margin-bottom: 4px;
        }
        .modal-box label .required {
            color: #e74c3c;
            margin-left: 2px;
        }
        .modal-box input,
        .modal-box select,
        .modal-box textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #dce7f3;
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
            font-family: var(--font);
            color: #1e2a3a;
            transition: 0.25s;
        }
        .modal-box input:focus,
        .modal-box select:focus,
        .modal-box textarea:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
        }
        .modal-box textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-box .form-row {
            display: flex;
            gap: 16px;
        }
        .modal-box .form-row>div {
            flex: 1;
        }
        .modal-box .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal-box .form-actions button {
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.25s;
        }
        .modal-box .btn-cancel {
            background: #eef4f9;
            color: #3a5a7a;
        }
        .modal-box .btn-cancel:hover {
            background: #dce7f3;
        }
        .modal-box .btn-submit {
            background: var(--primary);
            color: #fff;
        }
        .modal-box .btn-submit:hover {
            background: var(--primary-dark);
        }
        @media (max-width: 768px) {
            .toolbar {
                padding: 10px 16px;
            }
            .toolbar-center {
                flex: 1 1 100%;
                order: 3;
                min-width: 0;
            }
            .filter-bar {
                padding: 6px 16px 10px 16px;
            }
            .info-popup {
                max-width: 300px;
            }
            .modal-box {
                padding: 24px 20px 20px 20px;
            }
            .modal-box .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
        .retry-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(234, 241, 250, 0.80);
            z-index: 6;
            pointer-events: auto;
            font-family: var(--font);
        }
        .retry-box {
            background: white;
            padding: 24px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.10);
            text-align: center;
            max-width: 90%;
        }
        .retry-box .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .retry-box .title {
            font-size: 18px;
            font-weight: 600;
            color: #1e2a3a;
        }
        .retry-box .desc {
            font-size: 14px;
            color: #5a7a9a;
            margin: 8px 0 16px;
        }
        .retry-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .retry-box button:hover {
            background: var(--primary-dark);
        }
        .search-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.70);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            z-index: 15;
            pointer-events: none;
            backdrop-filter: blur(4px);
            animation: popFade 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- ===== 顶部工具栏 ===== -->
    <header class="toolbar">
        <div class="toolbar-left">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                大学地图
                <span>· 中国高校分布</span>
            </div>
        </div>
        <div class="toolbar-center">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索大学名称…" autocomplete="off" />
                <button class="clear-btn" id="clearSearchBtn" aria-label="清空搜索">✕</button>
            </div>
        </div>
        <div class="toolbar-right">
            <span class="stats-badge" id="statsBadge">共 <strong>0</strong> 所</span>
            <button class="btn-add" id="addUniBtn">➕ 添加大学</button>
        </div>
    </header>

    <!-- ===== 筛选栏 ===== -->
    <nav class="filter-bar">
        <span class="filter-label">🏷️ 筛选：</span>
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="双一流">🌟 双一流</button>
        <button class="filter-btn" data-filter="985工程">🏛️ 985工程</button>
        <button class="filter-btn" data-filter="211工程">📚 211工程</button>
        <button class="filter-btn" data-filter="普通本科">🎯 普通本科</button>
        <button class="filter-btn" data-filter="专科">🔧 专科</button>
    </nav>

    <!-- ===== 地图容器 ===== -->
    <div id="map-container">
        <div id="map-chart"></div>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">加载地图数据…</div>
        </div>
        <div class="info-popup" id="infoPopup">
            <button class="popup-close" id="popupClose">✕</button>
            <div class="uni-name" id="popupName">北京大学</div>
            <div class="uni-tags" id="popupTags"></div>
            <div class="uni-website" id="popupWebsite">
                <a href="#" target="_blank" rel="noopener">访问官网</a>
            </div>
            <div class="uni-desc" id="popupDesc">简介信息</div>
        </div>
    </div>

    <!-- ===== 添加大学模态框 ===== -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <h2>📌 添加大学</h2>
            <div class="sub">填写信息后，大学将出现在地图上（保存在本地浏览器中）</div>
            <label>大学名称 <span class="required">*</span></label>
            <input type="text" id="formName" placeholder="例如：西湖大学" />
            <div class="form-row">
                <div>
                    <label>经度 <span class="required">*</span></label>
                    <input type="number" id="formLng" placeholder="例如：120.1551" step="any" />
                </div>
                <div>
                    <label>纬度 <span class="required">*</span></label>
                    <input type="number" id="formLat" placeholder="例如：30.2741" step="any" />
                </div>
            </div>
            <label>办学层次 <span class="required">*</span></label>
            <select id="formLevel">
                <option value="双一流">🌟 双一流</option>
                <option value="985工程">🏛️ 985工程</option>
                <option value="211工程">📚 211工程</option>
                <option value="普通本科">🎯 普通本科</option>
                <option value="专科">🔧 专科</option>
            </select>
            <label>官方链接</label>
            <input type="url" id="formWebsite" placeholder="https://example.edu.cn" />
            <label>简介</label>
            <textarea id="formDesc" placeholder="请输入大学简介…" rows="2"></textarea>
            <div class="form-actions">
                <button class="btn-cancel" id="modalCancel">取消</button>
                <button class="btn-submit" id="modalSubmit">确认添加</button>
            </div>
        </div>
    </div>

        const LEVEL_MAP = {
            '双一流': { label: '🌟 双一流', cls: 'dual' },
            '985工程': { label: '🏛️ 985工程', cls: 'nine' },
            '211工程': { label: '📚 211工程', cls: 'two' },
            '普通本科': { label: '🎯 普通本科', cls: 'undergrad' },
            '专科': { label: '🔧 专科', cls: 'vocational' },
        };

        let allUniversities = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let selectedId = null;
        let chartInstance = null;
        let isMapLoaded = false;

        const chartDom = document.getElementById('map-chart');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const statsBadge = document.getElementById('statsBadge');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const popup = document.getElementById('infoPopup');
        const popupClose = document.getElementById('popupClose');
        const popupName = document.getElementById('popupName');
        const popupTags = document.getElementById('popupTags');
        const popupWebsite = document.getElementById('popupWebsite');
        const popupDesc = document.getElementById('popupDesc');
        const addModal = document.getElementById('addModal');
        const addUniBtn = document.getElementById('addUniBtn');
        const modalCancel = document.getElementById('modalCancel');
        const modalSubmit = document.getElementById('modalSubmit');
        const formName = document.getElementById('formName');
        const formLng = document.getElementById('formLng');
        const formLat = document.getElementById('formLat');
        const formLevel = document.getElementById('formLevel');
        const formWebsite = document.getElementById('formWebsite');
        const formDesc = document.getElementById('formDesc');

        // ================================================================
        //  数据管理
        // ================================================================
        function loadData() {
            const stored = localStorage.getItem('uniMap_data');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        allUniversities = parsed;
                        return;
                    }
                } catch (_) {}
            }
            allUniversities = JSON.parse(JSON.stringify(DEFAULT_UNIVERSITIES));
            saveData();
        }

        function saveData() {
            localStorage.setItem('uniMap_data', JSON.stringify(allUniversities));
        }

        function getFilteredData() {
            let result = allUniversities;
            if (currentFilter !== 'all') result = result.filter(u => u.level === currentFilter);
            if (searchQuery.trim()) {
                const q = searchQuery.trim().toLowerCase();
                result = result.filter(u => u.name.toLowerCase().includes(q));
            }
            return result;
        }

        function findUniversity(id) {
            return allUniversities.find(u => u.id === id);
        }

        function genId() {
            return allUniversities.reduce((max, u) => Math.max(max, u.id), 0) + 1;
        }

        function addUniversity(data) {
            const newUni = {
                id: genId(),
                name: data.name.trim(),
                lng: parseFloat(data.lng),
                lat: parseFloat(data.lat),
                level: data.level,
                website: data.website ? data.website.trim() : '',
                desc: data.desc ? data.desc.trim() : '',
            };
            allUniversities.push(newUni);
            saveData();
            return newUni;
        }

        // ================================================================
        //  地图加载（多源重试）
        // ================================================================
        const GEO_SOURCES = [
            'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
            'https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/json/china.json',
            'https://unpkg.com/echarts@5.4.3/map/json/china.json',
            'https://echarts.apache.org/examples/data/asset/geo/china.json'
        ];

        async function loadGeoWithRetry() {
            let lastError = null;
            for (let i = 0; i < GEO_SOURCES.length; i++) {
                const url = GEO_SOURCES[i];
                loadingText.textContent = `加载地图数据 (尝试 ${i+1}/${GEO_SOURCES.length})…`;
                try {
                    const resp = await fetch(url, { cache: 'force-cache' });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    // 简单校验
                    if (!data || !data.features || data.features.length === 0) {
                        throw new Error('数据格式无效');
                    }
                    return data;
                } catch (err) {
                    console.warn(`源 ${url} 加载失败:`, err);
                    lastError = err;
                    // 等待一下再尝试下一个
                    await new Promise(r => setTimeout(r, 300));
                }
            }
            throw new Error(`所有地图数据源均加载失败，最后错误: ${lastError?.message || '未知'}`);
        }

        async function loadGeoAndRender() {
            try {
                loadingOverlay.classList.remove('hidden');
                loadingText.textContent = '加载地图数据…';
                const geoJson = await loadGeoWithRetry();
                echarts.registerMap('china', geoJson);
                isMapLoaded = true;
                renderMap();
                loadingOverlay.classList.add('hidden');
            } catch (err) {
                console.error('地图加载最终失败:', err);
                loadingOverlay.classList.add('hidden');
                showRetryMessage(err.message);
            }
        }

        function showRetryMessage(errorMsg) {
            const container = document.getElementById('map-container');
            const old = container.querySelector('.retry-overlay');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'retry-overlay';
            div.innerHTML = `
                <div class="retry-box">
                    <div class="icon">🔄</div>
                    <div class="title">地图加载失败</div>
                    <div class="desc">${errorMsg || '请检查网络连接'}</div>
                    <button id="retryBtn">重试加载</button>
                </div>
            `;
            container.appendChild(div);
            document.getElementById('retryBtn').addEventListener('click', () => {
                div.remove();
                loadGeoAndRender();
            });
        }

        // ================================================================
        //  渲染地图
        // ================================================================
        function renderMap() {
            if (!chartInstance || !isMapLoaded) return;
            const filtered = getFilteredData();
            const total = allUniversities.length;
            const shown = filtered.length;
            statsBadge.innerHTML = `共 <strong>${total}</strong> 所${shown !== total ? ` · 显示 ${shown}` : ''}`;

            const scatterData = filtered.map(u => ({
                value: [u.lng, u.lat],
                id: u.id,
                name: u.name,
                level: u.level,
                website: u.website,
                desc: u.desc,
            }));

            const highlightId = selectedId;
            const option = {
                backgroundColor: 'transparent',
                tooltip: { show: false },
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    center: [104, 35],
                    itemStyle: {
                        areaColor: '#e8f0fa',
                        borderColor: '#b8cfe0',
                        borderWidth: 1.2,
                        shadowBlur: 6,
                        shadowColor: 'rgba(43,123,182,0.06)',
                    },
                    emphasis: {
                        itemStyle: { areaColor: '#d4e4f5' },
                        label: { show: false }
                    },
                    label: {
                        show: true,
                        color: '#5a7a9a',
                        fontSize: 10,
                    },
                },
                series: [{
                    name: '大学',
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: scatterData,
                    symbolSize: (val, params) => params.data.id === highlightId ? 22 : 14,
                    itemStyle: {
                        color: (params) => params.data.id === highlightId ? '#c0392b' : '#e74c3c',
                        shadowBlur: 6,
                        shadowColor: 'rgba(231,76,60,0.25)',
                        borderColor: '#fff',
                        borderWidth: 2,
                    },
                    emphasis: {
                        scale: 1.6,
                        itemStyle: {
                            color: '#c0392b',
                            shadowBlur: 12,
                            shadowColor: 'rgba(231,76,60,0.40)',
                            borderWidth: 2.5,
                        },
                        label: {
                            show: true,
                            formatter: '{b}',
                            position: 'top',
                            color: '#0a1a2a',
                            fontSize: 12,
                            fontWeight: 600,
                            backgroundColor: 'rgba(255,255,255,0.85)',
                            padding: [3, 10],
                            borderRadius: 6,
                            borderColor: 'rgba(43,123,182,0.15)',
                            borderWidth: 1,
                        }
                    },
                    label: {
                        show: true,
                        formatter: (params) => params.data.id === highlightId ? params.data.name : '',
                        position: 'top',
                        color: '#0a1a2a',
                        fontSize: 12,
                        fontWeight: 600,
                        backgroundColor: 'rgba(255,255,255,0.80)',
                        padding: [2, 8],
                        borderRadius: 4,
                    },
                    animationDelay: (idx) => idx * 30,
                }]
            };

            chartInstance.setOption(option, true);

            if (highlightId && !filtered.some(u => u.id === highlightId)) {
                selectedId = null;
                hidePopup();
            }

            chartInstance.off('click');
            chartInstance.on('click', (params) => {
                if (params && params.componentType === 'series' && params.data && params.data.id) {
                    const uni = findUniversity(params.data.id);
                    if (uni) {
                        showPopup(uni, params.event || null);
                        selectedId = params.data.id;
                        renderMap();
                    }
                }
            });

            chartInstance.off('mouseover');
            chartInstance.on('mouseover', (params) => {
                if (params && params.componentType === 'series') chartDom.style.cursor = 'pointer';
            });
            chartInstance.off('mouseout');
            chartInstance.on('mouseout', () => { chartDom.style.cursor = 'default'; });
        }

        // ================================================================
        //  弹窗控制
        // ================================================================
        function showPopup(uni, event) {
            const { name, level, website, desc } = uni;
            popupName.textContent = name;

            popupTags.innerHTML = '';
            level.split(',').map(l => l.trim()).forEach(lv => {
                const info = LEVEL_MAP[lv];
                const tag = document.createElement('span');
                tag.className = `uni-tag ${info ? info.cls : ''}`;
                tag.textContent = info ? info.label : lv;
                popupTags.appendChild(tag);
            });

            const linkEl = popupWebsite.querySelector('a');
            if (website && website.startsWith('http')) {
                linkEl.href = website;
                linkEl.textContent = '访问官网';
                linkEl.style.display = 'inline-flex';
            } else {
                linkEl.style.display = 'none';
            }
            popupDesc.textContent = desc || '暂无简介信息';

            const container = document.getElementById('map-container');
            const rect = container.getBoundingClientRect();

            let x, y;
            if (event && typeof event.clientX === 'number') {
                x = event.clientX - rect.left;
                y = event.clientY - rect.top - 20;
            } else {
                const coord = chartInstance.convertToPixel('geo', [uni.lng, uni.lat]);
                if (coord && Array.isArray(coord)) {
                    x = coord[0];
                    y = coord[1] - 30;
                } else {
                    x = rect.width / 2;
                    y = rect.height / 2 - 40;
                }
            }

            const popupWidth = Math.min(380, rect.width - 40);
            const popupHeight = 280;
            let left = Math.max(12, Math.min(x - popupWidth / 2, rect.width - popupWidth - 12));
            let top = Math.max(12, Math.min(y, rect.height - popupHeight - 12));

            if (y > rect.height - popupHeight - 30) {
                top = Math.max(12, y - popupHeight - 20);
                popup.classList.add('popup-top');
            } else {
                popup.classList.remove('popup-top');
            }

            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.style.maxWidth = popupWidth + 'px';
            popup.classList.add('visible');
        }

        function hidePopup() { popup.classList.remove('visible'); }

        // ================================================================
        //  搜索 & 筛选
        // ================================================================
        function performSearch() {
            const query = searchInput.value.trim();
            searchQuery = query;
            clearSearchBtn.classList.toggle('visible', query.length > 0);

            const filtered = getFilteredData();
            if (query && filtered.length > 0) {
                const matched = filtered.find(u => u.name.toLowerCase().includes(query.toLowerCase()));
                if (matched) {
                    selectedId = matched.id;
                    if (chartInstance && isMapLoaded) {
                        chartInstance.setOption({ geo: { center: [matched.lng, matched.lat], zoom: 4.5 } });
                    }
                    showPopup(matched, null);
                    renderMap();
                    return;
                }
            }

            if (!query) {
                selectedId = null;
                hidePopup();
                if (chartInstance && isMapLoaded) {
                    chartInstance.setOption({ geo: { center: [104, 35], zoom: 1.2 } });
                }
                renderMap();
            } else {
                selectedId = null;
                hidePopup();
                renderMap();
                showSearchToast('未找到匹配的大学');
            }
        }

        let toastTimer = null;

        function showSearchToast(msg) {
            const container = document.getElementById('map-container');
            const old = container.querySelector('.search-toast');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'search-toast';
            div.textContent = msg;
            container.appendChild(div);
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => div.remove(), 1500);
        }

        function setFilter(filter) {
            currentFilter = filter;
            filterBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
            selectedId = null;
            hidePopup();
            renderMap();
        }

        // ================================================================
        //  添加大学
        // ================================================================
        function openAddModal() {
            addModal.classList.add('visible');
            formName.value = '';
            formLng.value = '';
            formLat.value = '';
            formLevel.value = '双一流';
            formWebsite.value = '';
            formDesc.value = '';
            formName.focus();
        }

        function closeAddModal() { addModal.classList.remove('visible'); }

        function handleAddSubmit() {
            const name = formName.value.trim();
            const lng = parseFloat(formLng.value);
            const lat = parseFloat(formLat.value);
            const level = formLevel.value;
            const website = formWebsite.value.trim();
            const desc = formDesc.value.trim();

            if (!name) { alert('请输入大学名称'); return; }
            if (isNaN(lng) || lng < 73 || lng > 135) { alert('请输入有效经度 (73~135)'); return; }
            if (isNaN(lat) || lat < 3 || lat > 54) { alert('请输入有效纬度 (3~54)'); return; }
            if (allUniversities.some(u => u.name === name)) { alert('该大学已存在'); return; }

            const newUni = addUniversity({ name, lng, lat, level, website, desc });
            closeAddModal();
            if (currentFilter !== 'all') setFilter('all');
            else renderMap();
            selectedId = newUni.id;
            if (chartInstance && isMapLoaded) {
                chartInstance.setOption({ geo: { center: [newUni.lng, newUni.lat], zoom: 4.5 } });
            }
            renderMap();
            showPopup(newUni, null);
            searchInput.value = '';
            searchQuery = '';
            clearSearchBtn.classList.remove('visible');
        }

        // ================================================================
        //  初始化
        // ================================================================
        function init() {
            loadData();
            chartInstance = echarts.init(chartDom);
            window.addEventListener('resize', () => chartInstance.resize());
            loadGeoAndRender();

            searchInput.addEventListener('input', performSearch);
            searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                performSearch();
                searchInput.focus();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => setFilter(btn.dataset.filter));
            });

            popupClose.addEventListener('click', () => {
                selectedId = null;
                hidePopup();
                renderMap();
            });

            addUniBtn.addEventListener('click', openAddModal);
            modalCancel.addEventListener('click', closeAddModal);
            modalSubmit.addEventListener('click', handleAddSubmit);
            addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal(); });
            document.querySelectorAll('#addModal input, #addModal select, #addModal textarea').forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAddSubmit(); });
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (addModal.classList.contains('visible')) closeAddModal();
                    else {
                        selectedId = null;
                        hidePopup();
                        renderMap();
                    }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
            });
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }
    </script>
